version: '3.5'

services:
  tasktracker:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - tasktracker_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-TaskTracker2025!}
      - USER_USERNAME=${USER_USERNAME:-user}
      - USER_PASSWORD=${USER_PASSWORD:-User2025!}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@tasktracker.pro}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-https://clientes.cenas-support.com}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

  # Example: Uptime Kuma integration (uncomment to use)
  # uptime-kuma:
  #   image: louislam/uptime-kuma:latest
  #   container_name: uptime-kuma
  #   ports:
  #     - "3001:3001"
  #   volumes:
  #     - uptime_kuma_data:/app/data
  #   restart: unless-stopped
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  tasktracker_data:
  # uptime_kuma_data:  # Uncomment if using Uptime Kuma