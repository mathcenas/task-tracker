version: '3.5'

services:
  tasktracker:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - tasktracker_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=TaskTracker2025!
      - USER_USERNAME=user
      - USER_PASSWORD=User2025!
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true

volumes:
  tasktracker_data: