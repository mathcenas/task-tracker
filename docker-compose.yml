version: '3.8'

services:
  tasktracker:
    build: .
    ports:
      - "3000:3001"
    restart: unless-stopped
    volumes:
      - tasktracker_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true

volumes:
  tasktracker_data: